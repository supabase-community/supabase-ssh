app = "supabase-ssh"
primary_region = "iad"

# Deploy from apps/ssh/:
#   pnpm run deploy:prod
#   pnpm run deploy:staging
#
# First-time setup (repeat for each app/env):
#   fly apps create <app> --org <org>   (org only needed at creation)
#   fly ips allocate-v4 --app <app>     (port 22 needs a dedicated IPv4)
#   fly secrets set SSH_HOST_KEY="$(pnpm run --silent generate:host-key)" --app <app>
#
#   The host key is the only durable state. fly secrets list won't show the
#   value, but you can always recover it while a machine is running:
#     fly ssh console -C "printenv SSH_HOST_KEY" --app <app>

[deploy]
strategy = "rolling"
kill_timeout = "30s"

[build]
dockerfile = "Dockerfile"

[[vm]]
memory = "2048mb"
cpu_kind = "performance"
cpus = 1

[[services]]
protocol = "tcp"
internal_port = 22

# Concurrency limits - two concerns, handled by different layers:
#
# Latency (autoscaling):
#   Fly soft (25) - autoscale trigger per machine
#
# Server survival (rejection):
#   App RED  (80)  - probabilistic rejection begins (MAX_CONNECTIONS * 0.8)
#   App hard (100) - 100% rejection with friendly message (MAX_CONNECTIONS)
#   Fly hard (120) - last-resort backstop (app always owns rejection UX)
#
# performance-1x has dedicated CPU (no credit system). Soft limit can be
# much higher than shared-cpu since there's no credit cliff to avoid.
concurrency_type = "connections"
soft_limit = 25
hard_limit = 120

auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1

[[services.ports]]
port = 22

[[services.tcp_checks]]
interval = "10s"
timeout = "2s"
grace_period = "5s"

[[services]]
protocol = "tcp"
internal_port = 8080

auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[[services.http_checks]]
interval = "10s"
timeout = "2s"
grace_period = "5s"
path = "/healthz"

[metrics]
port = 9091
path = "/metrics"

[checks.healthz]
type = "http"
port = 9091
path = "/healthz"
interval = "10s"
timeout = "5s"
grace_period = "5s"
